# https://github.com/dart-lang/setup-dart
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
          architecture: x64

      - name: Install dependencies
        run: dart pub get --enforce-lockfile

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: dart analyze

      - name: Run tests
        run: dart test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
          architecture: x64

      - name: Install dependencies
        run: dart pub get --enforce-lockfile

      - name: Compile all binaries
        run: |
          dart compile exe --verbosity error -o bin/file-edit-mcp bin/file_edit_mcp.dart
          dart compile exe --verbosity error -o bin/convert-to-md-mcp bin/convert_to_md_mcp.dart
          dart compile exe --verbosity error -o bin/fetch-mcp bin/fetch_mcp.dart
          dart compile exe --verbosity error -o bin/dart-runner-mcp bin/dart_runner_mcp.dart
          dart compile exe --verbosity error -o bin/flutter-runner-mcp bin/flutter_runner_mcp.dart
          dart compile exe --verbosity error -o bin/git-mcp bin/git_mcp.dart

      - name: Verify binaries exist
        run: |
          ls -la bin/*-mcp
          echo "All binaries compiled successfully!"
