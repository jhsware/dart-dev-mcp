name: dart_dev_mcp
description: MCP servers for Dart/Flutter development - file editing, URL fetching, code indexing, and Dart/Flutter runners.
version: 0.2.0
publish_to: none
repository: https://github.com/jhsware/dart_dev_mcp

environment:
  sdk: ^3.9.3

dependencies:
  mcp_dart: ^1.2.2
  path: ^1.9.0
  http: ^1.2.0
  html: ^0.15.4
  git: ^2.3.2
  sqlite3: ^2.4.6
  uuid: ^4.5.1
  xxh3: ^1.2.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6

workspace:
  - packages/code_index
  - packages/dart_runner
  - packages/fetch
  - packages/filesystem
  - packages/flutter_runner
  - packages/git
  - packages/planner
  - packages/shared_libs
